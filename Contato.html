<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contato</title>
</head>

<body>

<h1>Contato</h1>

<form action="sucesso.html">
<label>Nome:</label><br>
<input type="text" name="nome" required><br><br>
<label>E-mail:</label><br>
<input type="email" name="email" required><br><br>
<label>Assunto:</label><br>
<input type="text" name="assunto" required><br><br>
<label>Mensagem:</label><br>
<textarea name="mensagem" rows="5" cols="40" required></textarea><br><br>
<label>Telefone:</label><br>
<input type="tel" name="telefone"><br><br>
<label>Data de contato:</label><br>
<input type="date" name="data"><br><br>
<label>Motivo do contato:</label><br>
<select name="motivo">
<option>Dúvida</option>
<option>Proposta de trabalho</option>
<option>Orçamento</option>
<option>Outro</option>
</select><br><br>
<input type="submit" value="Enviar">
<input type="reset" value="Limpar">
</form>
<br>
<a href="index..html">Voltar para página inicial</a>
</body>
</html>
